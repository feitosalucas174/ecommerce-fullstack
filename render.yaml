services:
  - type: web
    name: shopfull-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: shopfull-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://shopfull.vercel.app"

databases:
  - name: shopfull-db
    databaseName: shopfull
    user: shopfull
